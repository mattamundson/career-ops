# Canonical states for applications.md
# These are the ONLY valid values for the Status column.

states:
  # Pre-submit workflow (evaluation output + human decision)
  - name: GO
    description: Strong fit — apply when ready (PDF/CL often prepared)
    terminal: false
  - name: Conditional GO
    description: Good fit — resolve blockers in notes before applying
    terminal: false
  - name: Ready to Submit
    description: Materials complete — final human review then send
    terminal: false
  - name: In Progress
    description: Application started in ATS (partial submit, captcha, etc.)
    terminal: false
  - name: Evaluated
    description: Report completed, pending application decision
    terminal: false
  - name: Applied
    description: Application submitted by candidate
    terminal: false
  - name: Responded
    description: Company responded; candidate replied (inbound)
    terminal: false
  - name: Contact
    description: Candidate proactively reached out (outbound, LinkedIn, etc.)
    terminal: false
  - name: Interview
    description: In active interview process
    terminal: false
  - name: Offer
    description: Offer received
    terminal: true
  - name: Rejected
    description: Rejected by company
    terminal: true
  - name: Discarded
    description: Discarded by candidate or offer closed — not coming back
    terminal: true
  - name: Deferred
    description: Paused for priority/strategy reasons — revive if priority reverses
    terminal: false
  - name: SKIP
    description: Doesn't fit criteria — do not apply
    terminal: true

rules:
  - No markdown bold (**) in status field
  - No dates in status field (use the date column)
  - No extra text in status field (use the notes column)
  - Only values from this list are valid
